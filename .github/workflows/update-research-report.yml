name: Update research_report.json

on:
  schedule:
    # Runs daily at 05:30 UTC. Note: GitHub Actions cron uses UTC.
    - cron: '30 5 * * *'
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'stock_grabber_yf.py'
      - 'stock_grabber_*.py'
      - '.github/workflows/**'
      - 'structure.json'
      - 'requirements.txt'

jobs:
  update-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    name: Run yfinance script and commit report
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies (if present)
        run: |
          if [ -f requirements.txt ]; then python -m pip install --upgrade pip && pip install -r requirements.txt; else echo "no requirements.txt"; fi

      - name: Run stock_grabber_yf.py
        run: |
          python "./stock_grabber_yf.py"

      - name: Commit and push research_report.json if changed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add research_report.json || true
          if git diff --staged --quiet; then
            echo "No changes to research_report.json"
          else
            git commit -m "chore: update research_report.json [ci skip]"
            git pull --rebase origin main
            git push origin main
          fi
